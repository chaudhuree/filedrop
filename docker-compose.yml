services:
  localdrop:
    build: .
    container_name: localdrop
    ports:
      - "5566:5566"
    environment:
      - PORT=5566
      - NODE_ENV=production
      - STUN_SERVERS=stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      # Optional TURN server
      # - TURN_SERVER=turn:your-turn-server.com:3478
      # - TURN_USERNAME=your-username
      # - TURN_PASSWORD=your-password
    restart: unless-stopped
    # Use host network for proper device discovery by IP
    # Uncomment the next line and comment out 'ports' if devices aren't discovering each other
    # network_mode: host
